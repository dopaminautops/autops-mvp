services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: automation_builder
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/automation_builder
      REDIS_URL: redis://redis:6379/0
      HF_MODEL_PATH: google/flan-t5-small
    depends_on: [db, redis]
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000/api
    depends_on: [backend]
    ports: ["5173:5173"]
volumes:
  pg_data:
